name: Deploy AZO Flicker Fix to SiteGround

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Attempt SiteGround REST API Login
        id: sg_login
        env:
          SG_EMAIL: ${{ secrets.SG_EMAIL }}
          SG_PASS: ${{ secrets.SG_PASS }}
        run: |
          echo "=== Testing SiteGround REST API ==="
          
          # First, get the login page to capture any CSRF tokens
          echo "Getting login page..."
          LOGIN_PAGE=$(curl -s -c /tmp/sg_cookies.txt \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://my.siteground.com/")
          echo "Login page length: ${#LOGIN_PAGE}"
          
          # Try the API login endpoint - SiteGround uses JWT
          echo "Attempting API login..."
          LOGIN_RESPONSE=$(curl -s -b /tmp/sg_cookies.txt -c /tmp/sg_cookies.txt \
            -X POST "https://my.siteground.com/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/json" \
            -H "Origin: https://my.siteground.com" \
            -H "Referer: https://my.siteground.com/" \
            -d "{\"email\":\"${SG_EMAIL}\",\"password\":\"${SG_PASS}\"}" \
            -v 2>&1)
          echo "Login response: $LOGIN_RESPONSE"
          
          # Try alternative endpoint
          echo "Trying alternative login endpoint..."
          ALT_RESPONSE=$(curl -s \
            -X POST "https://my.siteground.com/auth/login" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -d "{\"email\":\"${SG_EMAIL}\",\"password\":\"${SG_PASS}\"}" \
            -v 2>&1)
          echo "Alt login response: $ALT_RESPONSE"
          
          # Try with form data
          echo "Trying form-based login..."
          FORM_RESPONSE=$(curl -s -b /tmp/sg_cookies.txt -c /tmp/sg_cookies.txt \
            -X POST "https://my.siteground.com/" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --data-urlencode "email=${SG_EMAIL}" \
            --data-urlencode "password=${SG_PASS}" \
            -L -v 2>&1)
          echo "Form response length: ${#FORM_RESPONSE}"
          echo "Form response first 500: ${FORM_RESPONSE:0:500}"
          
      - name: Try SFTP upload with various usernames
        env:
          SG_EMAIL: ${{ secrets.SG_EMAIL }}
          SG_PASS: ${{ secrets.SG_PASS }}
        run: |
          sudo apt-get install -y sshpass curl 2>/dev/null
          
          # Create the deploy file
          cat > /tmp/_deploy.php << 'PHPEOF'
          <?php
          $url = 'https://raw.githubusercontent.com/HCJefe/azo-temp-deploy/0046b32f8ec86c98b52fe8ca17449867565c6e18/azo-flythrough.zip';
          $dst = __DIR__ . '/azo-flythrough.zip';
          $ctx = stream_context_create(['http'=>['timeout'=>120]]);
          $bytes = file_put_contents($dst, fopen($url,'r',false,$ctx));
          echo "downloaded $bytes bytes\n";
          $zip = new ZipArchive;
          if ($zip->open($dst) === TRUE) {
              $zip->extractTo(__DIR__);
              $zip->close();
              @unlink($dst);
              echo "DONE\n";
          } else {
              echo "ZIP OPEN FAILED\n";
          }
          PHPEOF
          
          SERVER="34.174.71.40"
          
          # Try various possible SFTP usernames
          USERNAMES=(
            "$SG_EMAIL"
            "$(echo $SG_EMAIL | cut -d@ -f1)"
            "yumahomecare"
            "arizonaoutfitters"
            "admin"
          )
          
          for USER in "${USERNAMES[@]}"; do
            echo "Trying SFTP with username: $USER"
            RESULT=$(sshpass -p "$SG_PASS" sftp \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -o PasswordAuthentication=yes \
              -o PreferredAuthentications=password \
              "${USER}@${SERVER}" << 'SFTPEOF' 2>&1
          ls /
          bye
          SFTPEOF
            )
            echo "Result for $USER: $RESULT"
            if echo "$RESULT" | grep -v "Permission denied" | grep -v "Connection refused" | grep -q "sftp>"; then
              echo "SUCCESS: Connected with username $USER"
              # Upload the file
              sshpass -p "$SG_PASS" sftp \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=10 \
                "${USER}@${SERVER}" << 'SFTPEOF2' 2>&1
          cd public_html
          put /tmp/_deploy.php _deploy.php
          ls
          bye
          SFTPEOF2
              echo "Upload attempted for $USER"
              break
            fi
          done
          
      - name: Check if _deploy.php is available
        run: |
          echo "=== Checking deployment status ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://arizonaoutfitters.com/_deploy.php")
          echo "HTTP status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "SUCCESS: _deploy.php is accessible!"
            DEPLOY_OUTPUT=$(curl -s --max-time 300 "https://arizonaoutfitters.com/_deploy.php?fresh=50")
            echo "Deploy output: $DEPLOY_OUTPUT"
            
            if echo "$DEPLOY_OUTPUT" | grep -q "downloaded 4109052 bytes"; then
              echo "CONFIRMED: Correct byte count 4109052"
            fi
            if echo "$DEPLOY_OUTPUT" | grep -q "DONE"; then
              echo "CONFIRMED: DONE"
            fi
          else
            echo "FAILED: _deploy.php returned HTTP $HTTP_CODE"
            echo "Upload via GitHub Actions failed - login/SFTP blocked"
            echo "Manual deployment required via local browser"
          fi
